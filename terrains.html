<script>
document.querySelector(".menu-toggle").onclick = () => {
    document.querySelector("nav").classList.toggle("active");
};

let searchBox = document.getElementById("searchInput");
let searchBtn = document.getElementById("searchBtn");
let filterSelect = document.getElementById("filter");
let cards = document.querySelectorAll(".terrains-box");

function searchItems() {
    let searchval = searchBox.value.toLowerCase();
    let cityval = filterSelect.value.toLowerCase();

    let cards = document.querySelectorAll(".terrains-box");

    cards.forEach(card => {
        let title = card.querySelector("h3").textContent.toLowerCase();
        let city = card.querySelector(".city").textContent.toLowerCase();

        if (
            (title.includes(searchval) || searchval === "") &&
            (cityval === "tout" || city === cityval)
        ) {
            card.classList.remove("hidden");
        } else {
            card.classList.add("hidden");
        }
    });
}



searchBox.addEventListener("keydown", (event) => {
    if (event.key === "Enter") {
        searchItems();
    }
});

searchBtn.addEventListener("click", searchItems);

filterSelect.addEventListener("change", searchItems);

get_terrains()

async function get_terrains() {
    let res = await fetch("get_terrains.php")
    let repons = await res.json()
    let content = document.querySelector(".terrains-parent")
    if (repons.length === 0){
            content.innerHTML = "Ne pas des terrains";
            return;
    }
    content.innerHTML = "";
    repons.forEach(e=>{
        content.innerHTML += `
            <div class="terrains-box">
            <img src="${e.image}" alt="terrain">
        

            <div class="city">${e.city_name}</div>

            <h3>${e.terrain_name}</h3>

            <p>
                ${e.description}
            </p>

            <div class="price">${e.price_per_hour}DH</div>

            <a href="terrain_des.php?id=${e.id}"><button>Plus</button></a>
        </div>`;

    })

    
}
</script>
